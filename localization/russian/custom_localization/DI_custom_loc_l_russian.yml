 ### Adoption Localization Strings ###
 DI_adoption_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] must be older than [GetPlayer.MakeScope.Var('DI_secondary_character').Char.GetNameNoTooltip].#!"
 DI_adoption_triggered_desc_2: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_tertiary_character').Char.GetNameNoTooltip] must be older than [GetPlayer.MakeScope.Var('DI_secondary_character').Char.GetNameNoTooltip].#!"
 DI_adoption_triggered_desc_3: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] and [GetPlayer.MakeScope.Var('DI_tertiary_character').Char.GetNameNoTooltip] are already the parents of [GetPlayer.MakeScope.Var('DI_secondary_character').Char.GetNameNoTooltip].#!"
 DI_adoption_triggered_desc_4: "\n#color_yellow Can't have two male parents.#!"
 DI_adoption_triggered_desc_5: "\n#color_yellow Can't have two female parents.#!"
 
 ### Adoption House Localization Strings ###
 DI_adoption_house_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_secondary_character').Char.GetNameNoTooltip] is already a member of House [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetHouse.GetBaseName].#!"

 ### Custom Cadet Branch Localization Strings ###
 DI_cadet_branch_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] must not be dynasty head.#!"
 DI_cadet_branch_triggered_desc_2: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] must not be house head.#!"
 DI_cadet_branch_triggered_desc_3: "[Localize('DI_cadet_branch_triggered_desc_1')][Localize('DI_cadet_branch_triggered_desc_2')]"

 ### Custom Pregnancy Localization Strings ###
 DI_pregnancy_triggered_desc_1: "\n#color_yellow Can't be two male characters.#!"
 DI_pregnancy_triggered_desc_2: "\n#color_yellow Can't be two female characters.#!"
 DI_pregnancy_triggered_desc_3: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] must be pregnant.#!"

 ### Custom Set Real Father Localization Strings ###
 DI_set_real_father_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_secondary_character').Char.GetNameNoTooltip] is already the real father of [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip].#!"
 DI_set_real_father_triggered_desc_2: "\n#color_yellow Real father must be male.#!"
 DI_set_real_father_triggered_desc_3: "\n#color_yellow Real father must be older than child.#!"
 DI_set_father_as_real_father_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] has no father to reset to.#!"
 DI_set_father_as_real_father_triggered_desc_2: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetFather.GetNameNoTooltip] is already the real father of [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip].#!"

 ### Custom Marry Localization Strings ###
 DI_marry_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] is already married to [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetPrimarySpouse.GetNameNoTooltip].#!"
 DI_marry_triggered_desc_2: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_tertiary_character').Char.GetNameNoTooltip] is already married to [GetPlayer.MakeScope.Var('DI_tertiary_character').Char.GetPrimarySpouse.GetNameNoTooltip].#!"
 DI_marry_triggered_desc_3: "[Localize('DI_marry_triggered_desc_1')][Localize('DI_marry_triggered_desc_2')]"

 ### Custom Betrothal Localization Strings ###
 DI_betrothal_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] is already married to [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetPrimarySpouse.GetNameNoTooltip].#!"
 DI_betrothal_triggered_desc_2: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_tertiary_character').Char.GetNameNoTooltip] is already married to [GetPlayer.MakeScope.Var('DI_tertiary_character').Char.GetPrimarySpouse.GetNameNoTooltip].#!"
 DI_break_betrothal_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] is not betrothed.#!"

 ### Custom Divorce Localization Strings ###
 DI_divorce_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] is not married to [GetPlayer.MakeScope.Var('DI_tertiary_character').Char.GetNameNoTooltip].#!"

 ### Custom Make Siblings Localization Strings ###
 DI_make_siblings_triggered_desc_1: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] and [GetPlayer.MakeScope.Var('DI_secondary_character').Char.GetNameNoTooltip] are already siblings.#!"
 DI_make_siblings_triggered_desc_2: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip] is a parent of [GetPlayer.MakeScope.Var('DI_secondary_character').Char.GetNameNoTooltip].#!"
 DI_make_siblings_triggered_desc_3: "\n#color_yellow [GetPlayer.MakeScope.Var('DI_secondary_character').Char.GetNameNoTooltip] is a parent of [GetPlayer.MakeScope.Var('DI_primary_character').Char.GetNameNoTooltip].#!"